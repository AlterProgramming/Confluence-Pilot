name: Dimension scene

on:
  push:
    branches:
      - 'agent/dimension-scene-runtime'
    paths:
      - 'src/dimension/**'
      - 'public/reference/dimensions/**'
      - 'scripts/validate_dimension_scene.mjs'
      - 'src/App.tsx'
      - 'package.json'
      - '.github/workflows/dimension-scene.yml'
  pull_request:
    paths:
      - 'src/dimension/**'
      - 'public/reference/dimensions/**'
      - 'scripts/validate_dimension_scene.mjs'
      - 'src/App.tsx'
      - 'package.json'
      - '.github/workflows/dimension-scene.yml'

jobs:
  validate-dimension:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run validate:dimension
