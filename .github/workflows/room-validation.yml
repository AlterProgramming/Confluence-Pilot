name: Room validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: room-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Structural gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      room-matrix: ${{ steps.room-matrix.outputs.matrix }}
      full-evidence: ${{ steps.scope.outputs.full_evidence }}
      changed-files: ${{ steps.scope.outputs.changed_files }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Determine validation scope
        id: scope
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after || github.sha }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" && -n "${BEFORE_SHA:-}" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES="$(git diff --name-only HEAD^ HEAD)"
          else
            CHANGED_FILES="$(git show --pretty='' --name-only HEAD)"
          fi

          FULL_EVIDENCE=false
          if [[ "$GITHUB_EVENT_NAME" != "pull_request" || "${PR_DRAFT:-false}" != "true" ]]; then
            FULL_EVIDENCE=true
          elif grep -Eq '^(src/(App\.tsx|components/|scenes/|state/|data/)|public/|validation/|scripts/(capture_room_evidence|capture_runtime_smoke)\.mjs|\.github/workflows/room-validation\.yml|package(-lock)?\.json|vite\.config\.ts)' <<< "$CHANGED_FILES"; then
            FULL_EVIDENCE=true
          fi

          {
            echo "full_evidence=$FULL_EVIDENCE"
            echo "changed_files<<EOF"
            echo "$CHANGED_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate room manifests and types
        run: npm run validate

      - name: Build production bundle
        run: npm run build

      - name: Build evidence matrix from room registry
        id: room-matrix
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from 'node:fs';
          const registry = JSON.parse(readFileSync('validation/rooms.json', 'utf8'));
          const include = registry.rooms.map((room) => ({
            id: room.id,
            number: Number(room.id),
            asset: room.signatureAssets?.[0] ?? `/assets/room-${room.id}-asset.glb`,
          }));
          appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${JSON.stringify({ include })}\n`);
          NODE

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: production-bundle
          path: dist
          if-no-files-found: error
          retention-days: 1

      - name: Explain validation boundary
        run: |
          {
            echo '## Structural gate'
            echo
            echo '- TypeScript, lint, room-registry validation, and production build completed.'
            echo '- A green structural gate does **not** promote a room beyond `phase-1`.'
            echo '- Candidate or validated status still requires runtime evidence, manual criteria, and human approval.'
            echo "- Full runtime evidence requested for this run: **${{ steps.scope.outputs.full_evidence }}**"
          } >> "$GITHUB_STEP_SUMMARY"

  browser-smoke:
    name: Shared browser smoke
    needs: validate
    if: needs.validate.outputs.full-evidence == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: production-bundle
          path: dist

      - name: Start production preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/confluence-preview.log 2>&1 &
          echo $! > /tmp/confluence-preview.pid
          for attempt in {1..45}; do
            if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          mkdir -p validation/evidence/browser-smoke
          cp /tmp/confluence-preview.log validation/evidence/browser-smoke/preview.log
          exit 1

      - name: Launch browser and verify Room 02 runtime
        run: node scripts/capture_runtime_smoke.mjs http://127.0.0.1:4173

      - name: Upload browser-smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-validation-browser-smoke
          path: validation/evidence/browser-smoke
          if-no-files-found: warn
          retention-days: 14

  evidence:
    name: Evidence (${{ matrix.id }})
    needs:
      - validate
      - browser-smoke
    if: needs.browser-smoke.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.validate.outputs.room-matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: production-bundle
          path: dist

      - name: Start production preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/confluence-preview.log 2>&1 &
          echo $! > /tmp/confluence-preview.pid
          for attempt in {1..45}; do
            if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          mkdir -p validation/evidence/room-${{ matrix.id }}
          cp /tmp/confluence-preview.log validation/evidence/room-${{ matrix.id }}/preview.log
          exit 1

      - name: Capture Room ${{ matrix.id }} validation evidence
        run: node scripts/capture_room_evidence.mjs http://127.0.0.1:4173 ${{ matrix.number }} ${{ matrix.asset }}

      - name: Upload Room ${{ matrix.id }} evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-${{ matrix.id }}-validation-evidence
          path: validation/evidence/room-${{ matrix.id }}
          if-no-files-found: warn
          retention-days: 14

  gate-summary:
    name: Validation summary
    needs:
      - validate
      - browser-smoke
      - evidence
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish gate summary
        run: |
          {
            echo '## Room validation gate summary'
            echo
            echo '| Gate | Result |'
            echo '|---|---|'
            echo '| Structural gate | `${{ needs.validate.result }}` |'
            echo '| Shared browser smoke | `${{ needs.browser-smoke.result }}` |'
            echo '| Twelve-room evidence | `${{ needs.evidence.result }}` |'
            echo
            if [[ '${{ needs.validate.outputs.full-evidence }}' != 'true' ]]; then
              echo 'Full runtime evidence was intentionally deferred because this is a draft PR and the latest commit did not alter production-room or validation infrastructure.'
            else
              echo 'Full runtime evidence was requested. A failed evidence result is a real blocking gate; a skipped result means the shared smoke gate did not pass.'
            fi
            echo
            echo 'CI success is evidence availability, not automatic human validation. Room status remains governed by `validation/rooms.json` and explicit human review.'
          } >> "$GITHUB_STEP_SUMMARY"
