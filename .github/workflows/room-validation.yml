name: Room validation

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate room manifests and types
        run: npm run validate

      - name: Build production bundle
        run: npm run build

      - name: Install evidence browser
        run: npm install --no-save --package-lock=false puppeteer@24.16.0

      - name: Start production preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/confluence-preview.log 2>&1 &
          echo $! > /tmp/confluence-preview.pid
          for attempt in {1..45}; do
            if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/confluence-preview.log
          exit 1

      - name: Capture Room 01 validation evidence
        run: npm run evidence:room01

      - name: Upload Room 01 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-01-validation-evidence
          path: validation/evidence/room-01
          if-no-files-found: error
          retention-days: 14
