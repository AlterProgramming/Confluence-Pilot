name: Room validation

on:
  pull_request:
  push:
    branches:
      - main
      - 'agent/**'

concurrency:
  group: room-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate room manifests and types
        run: npm run validate

      - name: Build production bundle
        run: npm run build

      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: production-bundle
          path: dist
          if-no-files-found: error
          retention-days: 1

  performance:
    if: github.head_ref == 'agent/performance-smoothing' || github.ref_name == 'agent/performance-smoothing'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Check out optimized branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install optimized dependencies and browser
        run: |
          npm ci
          npm install --no-save --package-lock=false puppeteer@24.16.0

      - name: Download optimized production bundle
        uses: actions/download-artifact@v4
        with:
          name: production-bundle
          path: dist-optimized

      - name: Build main baseline
        run: |
          git fetch origin main
          git worktree add /tmp/confluence-main origin/main
          cd /tmp/confluence-main
          npm ci
          npm run build

      - name: Run matched baseline and optimized benchmarks
        env:
          HEADLESS: '1'
          PERF_ROUTE: '3,4,5,4,3,2'
        run: |
          set -euo pipefail
          mkdir -p validation/perf
          export CHROME_PATH="$(node -e "console.log(require('puppeteer').executablePath())")"

          cleanup() {
            if [[ -n "${SERVER_PID:-}" ]]; then
              kill "$SERVER_PID" 2>/dev/null || true
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          (cd /tmp/confluence-main/dist && python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/confluence-baseline-preview.log 2>&1) &
          SERVER_PID=$!
          for attempt in {1..45}; do
            curl --silent --fail http://127.0.0.1:4173/ > /dev/null && break
            sleep 1
          done
          node scripts/perf_harness.mjs http://127.0.0.1:4173 2
          cp validation/perf/report.json validation/perf/baseline.json
          cleanup
          unset SERVER_PID

          (cd dist-optimized && python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/confluence-optimized-preview.log 2>&1) &
          SERVER_PID=$!
          for attempt in {1..45}; do
            curl --silent --fail http://127.0.0.1:4173/ > /dev/null && break
            sleep 1
          done
          node scripts/perf_harness.mjs http://127.0.0.1:4173 2
          cp validation/perf/report.json validation/perf/optimized.json
          cleanup
          unset SERVER_PID

      - name: Compare performance reports
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const baseline = JSON.parse(fs.readFileSync('validation/perf/baseline.json', 'utf8'));
          const optimized = JSON.parse(fs.readFileSync('validation/perf/optimized.json', 'utf8'));
          const phases = ['idle', 'firstPass', 'replayPass', 'violentSwipe'];
          const lowerIsBetter = ['p95ms', 'p99ms', 'worstMs', 'hitches50', 'hitches100', 'frameBudgetDebtMs'];
          const result = {
            generatedAt: new Date().toISOString(),
            gpu: optimized.gpu,
            route: optimized.route,
            baselineHead: 'main',
            optimizedHead: process.env.GITHUB_SHA,
            phases: {},
            settle: {},
          };

          const percent = (before, after, lower) => {
            if (!Number.isFinite(before) || !Number.isFinite(after) || before === 0) return null;
            return +((lower ? (before - after) : (after - before)) / before * 100).toFixed(1);
          };

          for (const phase of phases) {
            const before = baseline[phase];
            const after = optimized[phase];
            if (!before || !after) continue;
            result.phases[phase] = {};
            for (const metric of ['avgFps', ...lowerIsBetter]) {
              result.phases[phase][metric] = {
                baseline: before[metric],
                optimized: after[metric],
                improvementPct: percent(before[metric], after[metric], metric !== 'avgFps'),
              };
            }
          }

          for (const pass of ['firstPassSettle', 'replayPassSettle']) {
            const before = baseline[pass];
            const after = optimized[pass];
            if (!before || !after) continue;
            result.settle[pass] = {};
            for (const metric of ['medianMs', 'p95Ms', 'worstMs']) {
              result.settle[pass][metric] = {
                baseline: before[metric],
                optimized: after[metric],
                improvementPct: percent(before[metric], after[metric], true),
              };
            }
          }

          fs.writeFileSync('validation/perf/comparison.json', JSON.stringify(result, null, 2));

          const fmt = (value) => value === null || value === undefined ? 'n/a' : value;
          const row = (phase, metric, label) => {
            const item = result.phases[phase]?.[metric];
            return item ? `| ${label} | ${fmt(item.baseline)} | ${fmt(item.optimized)} | ${item.improvementPct >= 0 ? '+' : ''}${fmt(item.improvementPct)}% |` : '';
          };
          const lines = [
            '# Confluence performance comparison',
            '',
            `GPU: ${result.gpu}`,
            '',
            '## First-pass navigation',
            '',
            '| Metric | Main | Optimized | Improvement |',
            '|---|---:|---:|---:|',
            row('firstPass', 'avgFps', 'Average FPS'),
            row('firstPass', 'p95ms', 'p95 frame (ms)'),
            row('firstPass', 'p99ms', 'p99 frame (ms)'),
            row('firstPass', 'worstMs', 'Worst frame (ms)'),
            row('firstPass', 'hitches100', 'Frames >100 ms'),
            row('firstPass', 'frameBudgetDebtMs', 'Frame-budget debt (ms)'),
            '',
            '## Replay navigation',
            '',
            '| Metric | Main | Optimized | Improvement |',
            '|---|---:|---:|---:|',
            row('replayPass', 'avgFps', 'Average FPS'),
            row('replayPass', 'p95ms', 'p95 frame (ms)'),
            row('replayPass', 'p99ms', 'p99 frame (ms)'),
            row('replayPass', 'worstMs', 'Worst frame (ms)'),
            row('replayPass', 'hitches100', 'Frames >100 ms'),
            row('replayPass', 'frameBudgetDebtMs', 'Frame-budget debt (ms)'),
            '',
            '> Positive percentages mean the optimized branch performed better. Total settle time may intentionally increase by up to the bounded preparation window while visible frame hitches decrease.',
          ].filter(Boolean);
          fs.writeFileSync('validation/perf/comparison.md', lines.join('\n') + '\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
          NODE

      - name: Upload performance comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-comparison
          path: |
            validation/perf/baseline.json
            validation/perf/optimized.json
            validation/perf/comparison.json
            validation/perf/comparison.md
          if-no-files-found: error
          retention-days: 14

  evidence:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: '01', number: 1, asset: '/assets/room-01-kiosk.glb' }
          - { id: '02', number: 2, asset: '/assets/room-02-credential-stack.glb' }
          - { id: '03', number: 3, asset: '/assets/room-03-fabricator.glb' }
          - { id: '04', number: 4, asset: '/assets/room-04-building-node.glb' }
          - { id: '05', number: 5, asset: '/assets/room-05-city-model.glb' }
          - { id: '06', number: 6, asset: '/assets/room-06-survey-rover.glb' }
          - { id: '07', number: 7, asset: '/assets/room-07-secure-vault.glb' }
          - { id: '08', number: 8, asset: '/assets/room-08-delivery-drone.glb' }
          - { id: '09', number: 9, asset: '/assets/room-09-satellite-terminal.glb' }
          - { id: '10', number: 10, asset: '/assets/room-10-coldchain-unit.glb' }
          - { id: '11', number: 11, asset: '/assets/room-11-fintech-vault.glb' }
          - { id: '12', number: 12, asset: '/assets/room-12-mainstreet-terminal.glb' }
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: production-bundle
          path: dist

      - name: Install evidence browser
        run: npm install --no-save --package-lock=false puppeteer@24.16.0

      - name: Start production preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/confluence-preview.log 2>&1 &
          echo $! > /tmp/confluence-preview.pid
          for attempt in {1..45}; do
            if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/confluence-preview.log
          exit 1

      - name: Capture Room ${{ matrix.id }} validation evidence
        run: node scripts/capture_room_evidence.mjs http://127.0.0.1:4173 ${{ matrix.number }} ${{ matrix.asset }}

      - name: Upload Room ${{ matrix.id }} evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-${{ matrix.id }}-validation-evidence
          path: validation/evidence/room-${{ matrix.id }}
          if-no-files-found: error
          retention-days: 14
