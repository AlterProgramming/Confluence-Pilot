name: Performance comparison

on:
  push:
    branches:
      - agent/performance-smoothing
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: performance-comparison-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compare:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/performance-smoothing'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out optimized branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and browser
        run: |
          npm ci
          npm install --no-save --package-lock=false puppeteer@24.16.0

      - name: Build optimized and main bundles
        run: |
          npm run build
          mv dist dist-optimized
          git fetch origin main
          git worktree add /tmp/confluence-main origin/main
          cd /tmp/confluence-main
          npm ci
          npm run build

      - name: Run matched benchmarks
        env:
          HEADLESS: '1'
          PERF_ROUTE: '3'
          PERF_WIDTH: '480'
          PERF_HEIGHT: '270'
          PERF_SKIP_VIOLENT: '1'
        run: |
          set -euo pipefail
          mkdir -p validation/perf
          export CHROME_PATH="$(node -e "console.log(require('puppeteer').executablePath())")"

          cleanup() {
            if [[ -n "${SERVER_PID:-}" ]]; then
              kill "$SERVER_PID" 2>/dev/null || true
              wait "$SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          (cd /tmp/confluence-main/dist && python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/confluence-baseline-preview.log 2>&1) &
          SERVER_PID=$!
          for attempt in {1..45}; do
            curl --silent --fail http://127.0.0.1:4173/ > /dev/null && break
            sleep 1
          done
          node scripts/perf_harness.mjs http://127.0.0.1:4173 2 2>&1 | tee validation/perf/baseline-console.log
          cp validation/perf/report.json validation/perf/baseline.json
          cleanup
          unset SERVER_PID

          (cd dist-optimized && python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/confluence-optimized-preview.log 2>&1) &
          SERVER_PID=$!
          for attempt in {1..45}; do
            curl --silent --fail http://127.0.0.1:4173/ > /dev/null && break
            sleep 1
          done
          node scripts/perf_harness.mjs http://127.0.0.1:4173 2 2>&1 | tee validation/perf/optimized-console.log
          cp validation/perf/report.json validation/perf/optimized.json
          cleanup
          unset SERVER_PID

      - name: Compare reports
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const baseline = JSON.parse(fs.readFileSync('validation/perf/baseline.json', 'utf8'));
          const optimized = JSON.parse(fs.readFileSync('validation/perf/optimized.json', 'utf8'));
          const lowerMetrics = ['p95ms', 'p99ms', 'worstMs', 'hitches50', 'hitches100', 'frameBudgetDebtMs'];
          const percent = (before, after, lower) => before
            ? +((lower ? before - after : after - before) / before * 100).toFixed(1)
            : null;
          const phases = {};
          for (const phase of ['idle', 'firstPass', 'replayPass']) {
            phases[phase] = {};
            for (const metric of ['avgFps', ...lowerMetrics]) {
              phases[phase][metric] = {
                baseline: baseline[phase]?.[metric],
                optimized: optimized[phase]?.[metric],
                improvementPct: percent(baseline[phase]?.[metric], optimized[phase]?.[metric], metric !== 'avgFps'),
              };
            }
          }
          const settle = {};
          for (const pass of ['firstPassSettle', 'replayPassSettle']) {
            settle[pass] = {};
            for (const metric of ['medianMs', 'p95Ms', 'worstMs']) {
              settle[pass][metric] = {
                baseline: baseline[pass]?.[metric],
                optimized: optimized[pass]?.[metric],
                improvementPct: percent(baseline[pass]?.[metric], optimized[pass]?.[metric], true),
              };
            }
          }
          const comparison = {
            generatedAt: new Date().toISOString(),
            gpu: optimized.gpu,
            viewport: optimized.viewport,
            route: optimized.route,
            baselineCommit: 'main',
            optimizedCommit: process.env.GITHUB_SHA,
            phases,
            settle,
            baselineLongTasks: baseline.longTasks,
            optimizedLongTasks: optimized.longTasks,
          };
          fs.writeFileSync('validation/perf/comparison.json', JSON.stringify(comparison, null, 2));

          const item = (phase, metric) => phases[phase][metric];
          const pct = (value) => value === null ? 'n/a' : `${value >= 0 ? '+' : ''}${value}%`;
          const rows = [
            ['Average FPS', item('firstPass', 'avgFps')],
            ['p95 frame (ms)', item('firstPass', 'p95ms')],
            ['p99 frame (ms)', item('firstPass', 'p99ms')],
            ['Worst frame (ms)', item('firstPass', 'worstMs')],
            ['Frames >100 ms', item('firstPass', 'hitches100')],
            ['Frame-budget debt (ms)', item('firstPass', 'frameBudgetDebtMs')],
          ];
          const markdown = [
            '# Confluence matched performance comparison',
            '',
            `GPU: ${comparison.gpu}`,
            `Viewport: ${comparison.viewport.width}×${comparison.viewport.height}`,
            'Route: Room 02 → Room 03',
            '',
            '## Cold transition',
            '',
            '| Metric | Main | Optimized | Improvement |',
            '|---|---:|---:|---:|',
            ...rows.map(([label, value]) => `| ${label} | ${value.baseline} | ${value.optimized} | ${pct(value.improvementPct)} |`),
            '',
            'Positive percentages mean the optimized branch performed better. Settle time is reported separately because the branch intentionally moves setup work into a bounded preparation phase.',
          ].join('\n');
          fs.writeFileSync('validation/perf/comparison.md', markdown + '\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, markdown + '\n');
          NODE

      - name: Upload comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-comparison
          path: validation/perf
          if-no-files-found: warn
          retention-days: 14
