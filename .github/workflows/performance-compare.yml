name: Performance comparison

on:
  push:
    branches:
      - agent/performance-smoothing
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: performance-comparison-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compare:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/performance-smoothing'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out optimized branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and browser
        run: |
          npm ci
          npm install --no-save --package-lock=false puppeteer@24.16.0

      - name: Build optimized and main bundles
        run: |
          npm run build
          mv dist dist-optimized
          git fetch origin main
          git worktree add /tmp/confluence-main origin/main
          cd /tmp/confluence-main
          npm ci
          npm run build

      - name: Run three matched trials
        env:
          HEADLESS: '1'
          PERF_ROUTE: '3'
          PERF_WIDTH: '480'
          PERF_HEIGHT: '270'
          PERF_SKIP_VIOLENT: '1'
        run: |
          set -euo pipefail
          mkdir -p validation/perf
          export CHROME_PATH="$(node -e "console.log(require('puppeteer').executablePath())")"

          cleanup() {
            if [[ -n "${SERVER_PID:-}" ]]; then
              kill "$SERVER_PID" 2>/dev/null || true
              wait "$SERVER_PID" 2>/dev/null || true
              unset SERVER_PID
            fi
          }
          trap cleanup EXIT

          run_case() {
            local label="$1"
            local directory="$2"
            local trial="$3"
            local preview_log="/tmp/confluence-${label}-${trial}-preview.log"

            (cd "$directory" && python3 -m http.server 4173 --bind 127.0.0.1 > "$preview_log" 2>&1) &
            SERVER_PID=$!
            for attempt in {1..45}; do
              if curl --silent --fail http://127.0.0.1:4173/ > /dev/null; then
                break
              fi
              sleep 1
            done

            node scripts/perf_harness.mjs http://127.0.0.1:4173 2 2>&1 \
              | tee "validation/perf/${label}-${trial}-console.log"
            cp validation/perf/report.json "validation/perf/${label}-${trial}.json"
            cleanup
          }

          # Alternate order to reduce runner warm-up and thermal bias.
          run_case baseline /tmp/confluence-main/dist 1
          run_case optimized dist-optimized 1
          run_case optimized dist-optimized 2
          run_case baseline /tmp/confluence-main/dist 2
          run_case baseline /tmp/confluence-main/dist 3
          run_case optimized dist-optimized 3

      - name: Compare medians and enforce performance gate
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const readTrials = (label) => [1, 2, 3].map((trial) =>
            JSON.parse(fs.readFileSync(`validation/perf/${label}-${trial}.json`, 'utf8')),
          );
          const baselineTrials = readTrials('baseline');
          const optimizedTrials = readTrials('optimized');
          const median = (values) => {
            const sorted = [...values].sort((a, b) => a - b);
            return sorted[Math.floor(sorted.length / 2)];
          };
          const percent = (before, after, lower) => before
            ? +((lower ? before - after : after - before) / before * 100).toFixed(1)
            : null;
          const aggregate = (trials, path) => median(trials.map((trial) => {
            let value = trial;
            for (const key of path) value = value?.[key];
            return value;
          }));

          const lowerMetrics = ['p95ms', 'p99ms', 'worstMs', 'hitches50', 'hitches100', 'frameBudgetDebtMs'];
          const phases = {};
          for (const phase of ['idle', 'firstPass', 'replayPass']) {
            phases[phase] = {};
            for (const metric of ['avgFps', ...lowerMetrics]) {
              const baseline = aggregate(baselineTrials, [phase, metric]);
              const optimized = aggregate(optimizedTrials, [phase, metric]);
              phases[phase][metric] = {
                baseline,
                optimized,
                improvementPct: percent(baseline, optimized, metric !== 'avgFps'),
              };
            }
          }

          const settle = {};
          for (const pass of ['firstPassSettle', 'replayPassSettle']) {
            settle[pass] = {};
            for (const metric of ['medianMs', 'p95Ms', 'worstMs']) {
              const baseline = aggregate(baselineTrials, [pass, metric]);
              const optimized = aggregate(optimizedTrials, [pass, metric]);
              settle[pass][metric] = {
                baseline,
                optimized,
                improvementPct: percent(baseline, optimized, true),
              };
            }
          }

          const checks = {
            coldAverageFpsAtLeastFivePercent: phases.firstPass.avgFps.improvementPct >= 5,
            coldFrameDebtAtLeastFivePercent: phases.firstPass.frameBudgetDebtMs.improvementPct >= 5,
            coldArrivalNoMoreThanFivePercentWorse: settle.firstPassSettle.medianMs.improvementPct >= -5,
            coldWorstFrameNoMoreThanFivePercentWorse: phases.firstPass.worstMs.improvementPct >= -5,
            replayFrameDebtNotWorse: phases.replayPass.frameBudgetDebtMs.improvementPct >= 0,
            idleFrameDebtNoMoreThanFivePercentWorse: phases.idle.frameBudgetDebtMs.improvementPct >= -5,
          };
          const passed = Object.values(checks).every(Boolean);
          const comparison = {
            generatedAt: new Date().toISOString(),
            gpu: optimizedTrials[0].gpu,
            viewport: optimizedTrials[0].viewport,
            route: optimizedTrials[0].route,
            trialCount: 3,
            baselineCommit: 'main',
            optimizedCommit: process.env.GITHUB_SHA,
            phases,
            settle,
            checks,
            passed,
            rawTrials: { baseline: baselineTrials, optimized: optimizedTrials },
          };
          fs.writeFileSync('validation/perf/comparison.json', JSON.stringify(comparison, null, 2));

          const item = (phase, metric) => phases[phase][metric];
          const pct = (value) => value === null ? 'n/a' : `${value >= 0 ? '+' : ''}${value}%`;
          const rows = [
            ['Average FPS', item('firstPass', 'avgFps')],
            ['p95 frame (ms)', item('firstPass', 'p95ms')],
            ['p99 frame (ms)', item('firstPass', 'p99ms')],
            ['Worst frame (ms)', item('firstPass', 'worstMs')],
            ['Frames >100 ms', item('firstPass', 'hitches100')],
            ['Frame-budget debt (ms)', item('firstPass', 'frameBudgetDebtMs')],
            ['Arrival time (ms)', settle.firstPassSettle.medianMs],
          ];
          const checkRows = Object.entries(checks).map(([name, ok]) => `| ${name} | ${ok ? 'PASS' : 'FAIL'} |`);
          const markdown = [
            '# Confluence repeated matched performance comparison',
            '',
            `GPU: ${comparison.gpu}`,
            `Viewport: ${comparison.viewport.width}×${comparison.viewport.height}`,
            'Route: Room 02 → Room 03',
            'Trials: 3 per build, alternating order; values below are medians.',
            '',
            '## Cold transition',
            '',
            '| Metric | Main | Optimized | Improvement |',
            '|---|---:|---:|---:|',
            ...rows.map(([label, value]) => `| ${label} | ${value.baseline} | ${value.optimized} | ${pct(value.improvementPct)} |`),
            '',
            'Arrival is a fixed-duration camera animation and is therefore gated as a non-regression metric; frame pacing must still improve by at least 5%.',
            '',
            '## Merge gate',
            '',
            '| Check | Result |',
            '|---|---|',
            ...checkRows,
            '',
            `**Overall: ${passed ? 'PASS' : 'FAIL'}**`,
          ].join('\n');
          fs.writeFileSync('validation/perf/comparison.md', markdown + '\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, markdown + '\n');
          if (!passed) process.exitCode = 1;
          NODE

      - name: Upload comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-comparison
          path: validation/perf
          if-no-files-found: warn
          retention-days: 14
